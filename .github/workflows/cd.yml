name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install build

      - run: python -m build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          python -c "import tomllib; f=open('dist/*.metadata','rb'); m=tomllib.load(f); print(f'Package: {m[\"name\"]} {m[\"version\"]}')"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
