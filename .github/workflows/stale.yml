name: Stale

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has had no activity for 14 days and has been marked as stale.
            If it is still relevant, please add a comment to keep it open.
            Otherwise, it will be closed in 30 days.
          stale-pr-message: >
            This PR has had no activity for 7 days and has been marked as stale.
            If it is still being worked on, please push a commit or add a comment.
            Otherwise, it will be closed in 14 days.
          close-issue-message: >
            This issue was closed because it has been inactive for 30 days
            since being marked as stale. Feel free to reopen if still relevant.
          close-pr-message: >
            This PR was closed because it has been inactive for 14 days
            since being marked as stale. Feel free to reopen if still relevant.
          days-before-stale: 14
          days-before-close: 30
          days-before-pr-stale: 7
          days-before-pr-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "priority:critical,priority:high,good first issue,help wanted"
          stale-pr-label: "stale"
          exempt-pr-labels: "priority:critical,priority:high"
