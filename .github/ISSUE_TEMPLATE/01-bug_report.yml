name: "🐛 Bug Report"
description: "Report a reproducible bug"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      render: shell
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Run `...`
        2. Set `...`
        3. Observe `...`
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g., 3.11.0"
    validations:
      required: true
  - type: input
    id: mlx-version
    attributes:
      label: MLX version
      placeholder: "e.g., 0.31.0"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g., macOS 15.3"
    validations:
      required: false
  - type: dropdown
    id: silicon-model
    attributes:
      label: Apple Silicon model
      options:
        - M1
        - M2
        - M3
        - M4
        - Other
    validations:
      required: false
  - type: input
    id: memory
    attributes:
      label: Memory
      placeholder: "e.g., 16GB"
    validations:
      required: false
  - type: textarea
    id: code
    attributes:
      label: Code snippet
      description: A minimal code snippet that reproduces the issue
      render: python
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem
    validations:
      required: false
