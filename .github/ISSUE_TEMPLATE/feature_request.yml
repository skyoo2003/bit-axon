name: "💡 Feature Request"
description: "Propose a new feature or enhancement"
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > Please discuss feature ideas in [Discussions](../../discussions/new?category=ideas) before opening an issue.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: A clear description of the problem you want to solve
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions you've considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the feature request
    validations:
      required: false
