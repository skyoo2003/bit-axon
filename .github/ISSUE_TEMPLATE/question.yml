name: "🤔 Question"
description: "Ask a question about usage or design"
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > Please check the [documentation](https://skyoo2003.github.io/bit-axon/) and [existing Discussions](../../discussions) before asking.
  - type: textarea
    id: question
    attributes:
      label: What is your question?
      description: Describe what you'd like to know
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Links to docs you've read, commands you've run, or approaches you've tried
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, macOS version, Apple Silicon model, etc.
      placeholder: |
        - Python: 3.11.0
        - macOS: 15.3
        - Chip: M3 Pro
    validations:
      required: false
